name: Update Activity Calendar

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-activity
  cancel-in-progress: true

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update-activity script
        run: node scripts/update-activity.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/live_calendar.json
          # Commit only if there are changes to live_calendar.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update activity calendar [skip ci]"
            # Retry push with rebase to handle concurrent pushes
            MAX_RETRIES=3
            for i in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              if [ $i -eq $MAX_RETRIES ]; then
                echo "Push failed after $MAX_RETRIES attempts"
                exit 1
              fi
              echo "Push failed (attempt $i/$MAX_RETRIES). Pulling with rebase and retrying..."
              git pull --rebase origin master
            done
          else
            echo "No changes in activity calendar. Skipping commit."
          fi
