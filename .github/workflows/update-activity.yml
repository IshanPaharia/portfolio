name: Update Activity Calendar

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run update-activity script
        run: node scripts/update-activity.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/live_calendar.json
          # Commit only if there are changes to live_calendar.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update activity calendar [skip ci]"
            git push
          else
            echo "No changes in activity calendar. Skipping commit."
          fi
